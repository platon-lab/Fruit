<!-- fruit_merge.html -->
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hero Merge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #1e003b, #4a0072, #001242);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        #app {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 900px;
            display: flex;
            flex-direction: column;
        }

        #menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .heroes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 350px;
        }

        .hero-btn {
            position: relative;
            aspect-ratio: 1;
            border-radius: 20px;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .hero-btn:active {
            transform: scale(0.95);
        }

        .hero-name {
            position: absolute;
            bottom: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 900;
        }

        /* ОНОВЛЕНИЙ МАЛИЙ ІНТЕРФЕЙС */
        #game-ui {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 5px;
        }

        .header {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 15px; /* Зменшено відступи */
            margin-bottom: 5px;
            z-index: 10;
            border-radius: 15px;
        }

        .score-board {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-title {
            font-size: 0.65rem; /* Зменшено шрифт */
            color: #aaa;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 1.2rem; /* Зменшено шрифт */
            font-weight: 900;
            color: #0ff;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
        }

        .next-preview {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #next-canvas {
            width: 40px; /* Зменшено превью */
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            margin-top: 2px;
        }

        .canvas-container {
            flex-grow: 1;
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #game-over h2 {
            font-size: 3rem;
            color: #ff0055;
            text-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
            margin-bottom: 10px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #00f2fe 0%, #4facfe 100%);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

    </style>
</head>
<body>

<div id="app">
    <div id="menu" class="glass">
        <h1>Обери Героя</h1>
        <div class="heroes-grid" id="heroes-container"></div>
    </div>

    <div id="game-ui">
        <div class="header glass">
            <div class="score-board">
                <span class="score-title">Очки</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="score-board">
                <span class="score-title">Рекорд</span>
                <span class="score-value" id="high-score" style="color: #f9d423;">0</span>
            </div>
            <div class="next-preview">
                <span class="score-title">Далі</span>
                <canvas id="next-canvas" width="60" height="60"></canvas>
            </div>
        </div>
        <div class="canvas-container">
            <canvas id="game-canvas"></canvas>
        </div>
    </div>

    <div id="game-over">
        <h2>GAME OVER</h2>
        <p style="font-size: 1.5rem">Очки: <span id="final-score" style="color:#0ff; font-weight:bold;">0</span></p>
        <button class="btn" onclick="resetGame()">Грати знову</button>
        <button class="btn" onclick="backToMenu()" style="background: linear-gradient(45deg, #ff0844 0%, #ffb199 100%); margin-top: 15px;">Змінити героя</button>
    </div>
</div>

<script>
    const heroes = ['Tito.png', 'Smartik.png', 'Junior.png', 'Fil.png', 'Milka.png', 'Bark.png'];
    
    const levels = [
        { r: 20, val: 2, color: 'rgba(255, 0, 0, 0.4)' },
        { r: 30, val: 4, color: 'rgba(255, 128, 0, 0.4)' },
        { r: 42, val: 8, color: 'rgba(255, 255, 0, 0.4)' },
        { r: 55, val: 16, color: 'rgba(0, 255, 0, 0.4)' },
        { r: 70, val: 32, color: 'rgba(0, 255, 255, 0.4)' },
        { r: 85, val: 64, color: 'rgba(0, 0, 255, 0.4)' },
        { r: 105, val: 128, color: 'rgba(128, 0, 255, 0.4)' },
        { r: 130, val: 256, color: 'rgba(255, 0, 255, 0.4)' },
        { r: 160, val: 512, color: 'rgba(255, 255, 255, 0.4)'},
        { r: 195, val: 1024, color: 'rgba(255, 215, 0, 0.6)' },
        { r: 240, val: 2048, color: 'rgba(255, 0, 0, 0.7)' }
    ];

    let currentHeroImage = new Image();
    let isHeroLoaded = false;

    const menuEl = document.getElementById('menu');
    const gameUiEl = document.getElementById('game-ui');
    const gameOverEl = document.getElementById('game-over');
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next-canvas');
    const nextCtx = nextCanvas.getContext('2d');
    
    let width, height;
    let balls = [];
    let score = 0;
    let highScore = localStorage.getItem('fruitMergeHighScore') || 0;
    document.getElementById('high-score').innerText = highScore;
    
    let currentDropX = 0;
    let currentDropLevel = 0;
    let nextDropLevel = 0;
    let canDrop = true;
    let animationFrameId;
    let isGameOver = false;

    const GRAVITY = 0.6;
    const RESTITUTION = 0.2;
    const FRICTION = 0.98;
    
    function initMenu() {
        const container = document.getElementById('heroes-container');
        container.innerHTML = '';
        heroes.forEach(hero => {
            const btn = document.createElement('div');
            btn.className = 'hero-btn';
            const name = hero.replace('.png', '');
            btn.innerHTML = `<div class="hero-name">${name}</div>`;
            
            const img = new Image();
            img.src = hero;
            img.onload = () => {
                btn.style.backgroundImage = `url(${hero})`;
                btn.style.backgroundSize = 'cover';
                btn.style.backgroundPosition = 'center';
            };

            btn.onclick = () => {
                // ПОВНОЕКРАННИЙ РЕЖИМ ПРИ СТАРТІ[cite: 1]
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(e => console.log(e));
                }
                startGameWithHero(hero);
            };
            container.appendChild(btn);
        });
    }

    function startGameWithHero(hero) {
        currentHeroImage.src = hero;
        isHeroLoaded = true;
        menuEl.style.display = 'none';
        gameUiEl.style.display = 'flex';
        resizeCanvas();
        resetGame();
    }

    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        width = canvas.width;
        height = canvas.height;
        currentDropX = width / 2;
    }

    window.addEventListener('resize', () => {
        if (gameUiEl.style.display === 'flex') resizeCanvas();
    });

    class Ball {
        constructor(x, y, level, isStatic = false) {
            this.x = x; this.y = y; this.level = level;
            this.r = levels[level].r;
            this.val = levels[level].val;
            this.vx = 0; this.vy = 0;
            this.isStatic = isStatic;
            this.markedForDeletion = false;
        }

        draw(context, x = this.x, y = this.y) {
            context.save();
            context.beginPath();
            context.arc(x, y, this.r, 0, Math.PI * 2);
            context.clip();

            if (isHeroLoaded && currentHeroImage.complete && currentHeroImage.naturalWidth > 0) {
                const s = this.r * 2;
                context.drawImage(currentHeroImage, x - this.r, y - this.r, s, s);
            } else {
                context.fillStyle = '#333';
                context.fill();
            }

            context.fillStyle = levels[this.level].color;
            context.fill();
            
            const gradient = context.createRadialGradient(x - this.r*0.3, y - this.r*0.3, this.r*0.1, x, y, this.r);
            gradient.addColorStop(0, 'rgba(255,255,255,0.4)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fill();

            context.lineWidth = 2;
            context.strokeStyle = 'rgba(255,255,255,0.5)';
            context.stroke();
            context.restore();

            context.save();
            context.fillStyle = '#fff';
            context.strokeStyle = '#000';
            context.lineWidth = Math.max(2, this.r * 0.1);
            context.font = `900 ${this.r * 0.8}px Nunito`;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.strokeText(this.val, x, y);
            context.fillText(this.val, x, y);
            context.restore();
        }

        update() {
            if (this.isStatic) return;
            this.vy += GRAVITY;
            this.vx *= FRICTION;
            this.vy *= FRICTION;
            this.x += this.vx;
            this.y += this.vy;

            if (this.x - this.r < 0) { this.x = this.r; this.vx *= -RESTITUTION; }
            else if (this.x + this.r > width) { this.x = width - this.r; this.vx *= -RESTITUTION; }
            if (this.y + this.r > height) { this.y = height - this.r; this.vy *= -RESTITUTION; }
        }
    }

    function generateRandomLevel() {
        const rand = Math.random();
        if (rand < 0.5) return 0;
        if (rand < 0.85) return 1;
        return 2;
    }

    function updateNextPreview() {
        nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        const dummyBall = new Ball(nextCanvas.width/2, nextCanvas.height/2, nextDropLevel, true);
        dummyBall.r = 15; // Маленький розмір для малого UI
        dummyBall.draw(nextCtx);
    }

    function spawnNextDrop() {
        currentDropLevel = nextDropLevel;
        nextDropLevel = generateRandomLevel();
        updateNextPreview();
        canDrop = true;
    }

    function resolveCollisions() {
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                let b1 = balls[i]; let b2 = balls[j];
                if (b1.isStatic || b2.isStatic || b1.markedForDeletion || b2.markedForDeletion) continue;

                let dx = b2.x - b1.x;
                let dy = b2.y - b1.y;
                let distSq = dx * dx + dy * dy;
                let minDist = b1.r + b2.r;

                if (distSq < minDist * minDist) {
                    let dist = Math.sqrt(distSq);
                    if (b1.level === b2.level && b1.level < levels.length - 1) {
                        b1.markedForDeletion = true; b2.markedForDeletion = true;
                        let newBall = new Ball((b1.x+b2.x)/2, (b1.y+b2.y)/2, b1.level + 1);
                        newBall.vx = (b1.vx + b2.vx) * 0.5;
                        newBall.vy = (b1.vy + b2.vy) * 0.5 - 2;
                        balls.push(newBall);
                        addScore(levels[newBall.level].val);
                        continue;
                    }
                    if (dist === 0) { dx = 1; dy = 0; dist = 1; }
                    let overlap = minDist - dist;
                    let nx = dx / dist; let ny = dy / dist;
                    let totalM = (b1.r*b1.r) + (b2.r*b2.r);
                    b1.x -= nx * overlap * ((b2.r*b2.r)/totalM);
                    b1.y -= ny * overlap * ((b2.r*b2.r)/totalM);
                    b2.x += nx * overlap * ((b1.r*b1.r)/totalM);
                    b2.y += ny * overlap * ((b1.r*b1.r)/totalM);
                    let kx = b1.vx - b2.vx; let ky = b1.vy - b2.vy;
                    let p = 2 * (nx * kx + ny * ky) / totalM;
                    b1.vx -= p * (b2.r*b2.r) * RESTITUTION * nx;
                    b1.vy -= p * (b2.r*b2.r) * RESTITUTION * ny;
                    b2.vx += p * (b1.r*b1.r) * RESTITUTION * nx;
                    b2.vy += p * (b1.r*b1.r) * RESTITUTION * ny;
                }
            }
        }
        balls = balls.filter(b => !b.markedForDeletion);
    }

    function checkGameOver() {
        if (isGameOver) return;
        const deathLine = 80;
        for (let b of balls) {
            if (!b.isStatic && b.y - b.r < deathLine && Math.abs(b.vy) < 1) {
                if (!b.dangerTime) b.dangerTime = Date.now();
                if (Date.now() - b.dangerTime > 1500) { gameOver(); return; }
            } else { b.dangerTime = null; }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        ctx.beginPath();
        ctx.moveTo(0, 80); ctx.lineTo(width, 80);
        ctx.strokeStyle = 'rgba(255, 0, 85, 0.3)';
        ctx.setLineDash([10, 10]); ctx.stroke();

        for (let b of balls) b.draw(ctx);

        if (canDrop && !isGameOver) {
            const dropR = levels[currentDropLevel].r;
            currentDropX = Math.max(dropR, Math.min(width - dropR, currentDropX));
            ctx.beginPath();
            ctx.moveTo(currentDropX, 40); ctx.lineTo(currentDropX, height);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.setLineDash([5, 5]); ctx.stroke();
            new Ball(currentDropX, 40, currentDropLevel, true).draw(ctx);
        }
    }

    function update() {
        if (isGameOver) return;
        for (let i = 0; i < 4; i++) {
            for (let b of balls) b.update();
            resolveCollisions();
        }
        checkGameOver();
    }

    function gameLoop() {
        update(); draw();
        animationFrameId = requestAnimationFrame(gameLoop);
    }

    function handleMove(clientX) {
        if (!canDrop || isGameOver) return;
        const rect = canvas.getBoundingClientRect();
        currentDropX = clientX - rect.left;
    }

    function handleDrop() {
        if (!canDrop || isGameOver) return;
        canDrop = false;
        const dropR = levels[currentDropLevel].r;
        balls.push(new Ball(Math.max(dropR, Math.min(width - dropR, currentDropX)), 40, currentDropLevel));
        setTimeout(spawnNextDrop, 800);
    }

    canvas.addEventListener('touchstart', (e) => handleMove(e.touches[0].clientX));
    canvas.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX));
    canvas.addEventListener('touchend', handleDrop);
    canvas.addEventListener('mousemove', (e) => handleMove(e.clientX));
    canvas.addEventListener('mouseup', handleDrop);

    function addScore(points) {
        score += points;
        document.getElementById('score').innerText = score;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('fruitMergeHighScore', highScore);
            document.getElementById('high-score').innerText = highScore;
        }
    }

    function resetGame() {
        cancelAnimationFrame(animationFrameId);
        balls = []; score = 0;
        document.getElementById('score').innerText = 0;
        isGameOver = false;
        gameOverEl.style.display = 'none';
        nextDropLevel = generateRandomLevel();
        spawnNextDrop();
        gameLoop();
    }

    function gameOver() {
        isGameOver = true;
        document.getElementById('final-score').innerText = score;
        gameOverEl.style.display = 'flex';
    }

    function backToMenu() {
        cancelAnimationFrame(animationFrameId);
        gameOverEl.style.display = 'none';
        gameUiEl.style.display = 'none';
        menuEl.style.display = 'flex';
        if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
    }

    initMenu();
</script>
</body>
</html>
